# CI SwiftLint en push/PR a main.
# Activado `--strict`: cualquier
# warning bloquea el merge. Disables pragmáticas documentadas en
# `.swiftlint.yml`

name: SwiftLint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: swiftlint (strict)
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Show SwiftLint version
        run: swiftlint version

      - name: Run SwiftLint --strict
        run: swiftlint lint --strict --reporter github-actions-logging
